<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .box { fill: #f5f7fa; stroke: #2b3a55; stroke-width: 2; rx: 8; }
    .accent { fill: #eaf1ff; stroke: #2b6cb0; stroke-width: 2; rx: 8; }
    .label { font-size: 14px; fill: #1a202c; }
    .title { font-size: 15px; font-weight: bold; fill: #1a202c; }
    .small { font-size: 11px; fill: #4a5568; }
    .arrow { stroke: #2b3a55; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55" />
    </marker>
  </defs>

  <rect x="20" y="20" width="220" height="70" class="box" />
  <text x="130" y="48" text-anchor="middle" class="title">Query Issued</text>
  <text x="130" y="66" text-anchor="middle" class="small">SELECT * FROM vw_name</text>

  <path d="M240 55 H300" class="arrow" />

  <rect x="300" y="20" width="220" height="70" class="accent" />
  <text x="410" y="48" text-anchor="middle" class="title">View Definition</text>
  <text x="410" y="66" text-anchor="middle" class="small">stored in information_schema</text>

  <path d="M410 90 V130" class="arrow" />

  <rect x="300" y="130" width="220" height="70" class="box" />
  <text x="410" y="158" text-anchor="middle" class="title">Optimizer Decision</text>
  <text x="410" y="176" text-anchor="middle" class="small">MERGE or TEMPTABLE</text>

  <path d="M410 200 V240" class="arrow" />

  <rect x="300" y="240" width="220" height="60" class="box" />
  <text x="410" y="265" text-anchor="middle" class="title">Base Table(s)</text>
  <text x="410" y="283" text-anchor="middle" class="small">rows read live, every time</text>

  <path d="M520 270 H600" class="arrow" />
  <rect x="600" y="240" width="140" height="60" class="accent" />
  <text x="670" y="265" text-anchor="middle" class="title">Result</text>
  <text x="670" y="283" text-anchor="middle" class="small">returned to caller</text>
</svg>
