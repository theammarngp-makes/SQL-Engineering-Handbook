<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <style>
    .role { fill: #f5f7fa; stroke: #2b3a55; stroke-width: 2; rx: 8; }
    .view { fill: #eaf1ff; stroke: #2b6cb0; stroke-width: 2; rx: 8; }
    .table { fill: #fdf0e8; stroke: #b7591f; stroke-width: 2; rx: 8; }
    .label { font-size: 13px; fill: #1a202c; }
    .title { font-size: 14px; font-weight: bold; fill: #1a202c; }
    .deny { font-size: 11px; fill: #c53030; font-weight: bold; }
    .arrow { stroke: #2b3a55; stroke-width: 2; marker-end: url(#ah2); fill: none; }
    .blocked { stroke: #c53030; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
  </style>
  <defs>
    <marker id="ah2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b3a55" />
    </marker>
  </defs>

  <rect x="30" y="110" width="180" height="60" class="role" />
  <text x="120" y="145" text-anchor="middle" class="title">regional_manager</text>

  <path d="M210 140 H300" class="arrow" />
  <text x="255" y="130" text-anchor="middle" class="label">SELECT</text>

  <rect x="300" y="60" width="200" height="60" class="view" />
  <text x="400" y="95" text-anchor="middle" class="title">vw_salary_bands</text>

  <path d="M400 120 V190" class="arrow" />
  <text x="440" y="160" class="label" font-size="11">runs as DEFINER</text>

  <rect x="300" y="190" width="200" height="60" class="table" />
  <text x="400" y="225" text-anchor="middle" class="title">hr_employees</text>

  <path d="M120 170 C120 230, 300 230, 300 220" class="blocked" />
  <text x="150" y="260" class="deny">NO direct GRANT</text>
</svg>
